server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  datasource:
    url: jdbc:h2:file:./data/snap-meal;MODE=MySQL;DATABASE_TO_UPPER=true;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql.init:
    mode: always
    continue-on-error: true
    encoding: UTF-8
  servlet.multipart:
    max-file-size: 10MB
    max-request-size: 10MB
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
sky:
  security:
    token-secret: ${TOKEN_SECRET:snap-meal-course-secret-change-in-production}
  integrations:
    oss-mode: local
    wechat-mode: mock
    payment-mode: mock
  shop:
    name: 山岚食集
    address: 上海市杨浦区大学路100号
    delivery-radius-km: 5
